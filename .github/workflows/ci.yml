name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Secret scanning — must pass before anything else ──────────────────────
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  # ── Python backend ──────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/

      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports

      - name: Start API and run tests
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 2
          pytest tests/ -v --tb=short

  # ── Solidity contracts ──────────────────────────────────────────────────────
  contracts:
    name: Contracts (Solidity)
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Hardhat
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run Hardhat tests
        run: npx hardhat test

      - name: Slither static analysis
        uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          slither-args: --exclude-dependencies
        continue-on-error: true   # advisory only for PoC; make blocking pre-launch

  # ── Dependency audit ───────────────────────────────────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit
        run: |
          npm ci
          npm audit --audit-level=high

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt
