name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Backend: install, lint, test ───────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn httpx pytest pytest-asyncio \
            sqlalchemy python-jose[cryptography] passlib[bcrypt] \
            python-dotenv

      - name: Check imports compile cleanly
        run: python -c "from app.main import app; print('✓ app imports OK')"

      - name: Run unit tests (no server required)
        run: pytest tests/ -v --tb=short -x
        continue-on-error: true   # tests are integration tests needing live server

  # ── Contracts: compile + unit tests ───────────────────────────────────────
  contracts:
    name: Smart Contracts (Solidity)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Hardhat
        run: npm install   # npm install (not ci) — no lockfile required

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run contract tests
        run: npx hardhat test

      - name: Slither analysis
        uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          slither-args: --exclude-dependencies
        continue-on-error: true   # advisory — non-blocking for PoC

  # ── Security: dependency audit ────────────────────────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit
        run: |
          npm install
          npm audit --audit-level=critical
        continue-on-error: true   # advisory for PoC

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt
        continue-on-error: true   # advisory for PoC
