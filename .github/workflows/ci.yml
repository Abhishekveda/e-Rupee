name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── PRIMARY: Backend tests — this is what matters for the PoC ─────────────
  backend:
    name: Backend · Python 3.12
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install \
            fastapi==0.111.0 uvicorn==0.29.0 httpx==0.27.0 \
            sqlalchemy==2.0.30 "python-jose[cryptography]==3.3.0" \
            "passlib[bcrypt]==1.7.4" python-dotenv==1.0.1 pytest==8.2.0

      - name: Run 21 agent tests
        working-directory: backend
        run: pytest tests/test_ci.py -v --tb=short

  # ── ADVISORY: Contracts — reports but never fails the build ───────────────
  contracts:
    name: Smart Contracts · Solidity (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true        # advisory — does not block merge

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install (no cache)
        run: npm install

      - name: Show contracts
        run: find contracts -name "*.sol"

      - name: Clean all Hardhat state
        run: rm -rf artifacts cache && npx hardhat clean

      - name: Compile
        run: npx hardhat compile

      - name: Test
        run: npx hardhat test
