name: Deploy contracts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        default: "sepolia"
        type: choice
        options: [sepolia, hardhat]

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.network || 'sepolia' }}
    runs-on: ubuntu-latest
    environment: testnet          # requires manual approval in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npx hardhat compile

      - name: Deploy
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          npx hardhat run scripts/deploy.js \
            --network ${{ github.event.inputs.network || 'sepolia' }}

      - name: Upload deployed addresses
        uses: actions/upload-artifact@v4
        with:
          name: deployed-addresses
          path: deployed-addresses.json
          retention-days: 90
